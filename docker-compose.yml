services:
  mongodb:
    image: mongo:4.4
    ports:
      - "8382:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongo", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks:
      vm_network:

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "8383:5672"
      - "8384:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 5
    networks:
      vm_network:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2019-latest
    ports:
      - "8385:1433"
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=PawsCare123!
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P PawsCare123! -Q 'SELECT 1' || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 5
    networks:
      vm_network:

  api-server:
    build:
      context: ./api-server
      dockerfile: Dockerfile
    ports:
      - "8381:3000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/pawscare
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      vm_network:

  background-worker:
    build:
      context: ./background-worker
      dockerfile: Dockerfile
    environment:
      - RABBITMQ_HOST=rabbitmq
      - API_SERVER_URL=http://api-server:3000
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'python3 worker.py' || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    depends_on:
      rabbitmq:
        condition: service_healthy
      api-server:
        condition: service_healthy
    networks:
      vm_network:

  web-frontend:
    build:
      context: ./web-frontend
      dockerfile: Dockerfile
    ports:
      - "8380:8080"
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__SqlServer=Server=sqlserver;Database=PawsCare;User Id=sa;Password=PawsCare123!;TrustServerCertificate=true
      - ApiServer__BaseUrl=http://api-server:3000
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    depends_on:
      api-server:
        condition: service_healthy
      sqlserver:
        condition: service_healthy
    networks:
      vm_network:

networks:
  vm_network:
    driver: bridge

volumes:
  mongodb_data:
