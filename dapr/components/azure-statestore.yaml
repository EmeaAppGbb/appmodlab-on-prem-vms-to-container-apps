apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: statestore
  namespace: default
spec:
  type: state.azure.cosmosdb
  version: v1
  metadata:
    - name: url
      value: "<AZURE_COSMOSDB_ENDPOINT>"
    - name: masterKey
      value: "<AZURE_COSMOSDB_MASTER_KEY>"
    - name: database
      value: "pawscare-state"
    - name: collection
      value: "state"
    - name: actorStateStore
      value: "true"
